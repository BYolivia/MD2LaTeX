name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux: un job paralelo por distro usando Docker ─────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: arch
            image: archlinux:latest
          - distro: debian
            image: debian:bookworm
          - distro: fedora
            image: fedora:latest
          - distro: ubuntu
            image: ubuntu:20.04

    steps:
      - uses: actions/checkout@v4

      - name: Compilar en Docker (${{ matrix.distro }})
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ${{ matrix.image }} \
            bash -c "bash scripts/build-linux.sh && mv dist/md2latex dist/md2latex-linux-${{ matrix.distro }}"
          sudo chown -R "$USER:$USER" dist/

      - name: Subir artefacto (${{ matrix.distro }})
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-linux-${{ matrix.distro }}
          path: dist/md2latex-linux-${{ matrix.distro }}

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller md2latex.spec

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-windows
          path: dist/md2latex.exe

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller md2latex.spec

      - name: Renombrar ejecutable
        run: mv dist/md2latex dist/md2latex-macos

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-macos
          path: dist/md2latex-macos

  # ── Release: espera a todos los builds ───────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Crear release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "md2LaTeX ${{ github.ref_name }}"
          body: |
            ## md2LaTeX ${{ github.ref_name }}

            Conversor bidireccional Markdown ↔ LaTeX con interfaz gráfica.

            ### Descargas

            | Plataforma | Archivo |
            |---|---|
            | Linux — Arch | `md2latex-linux-arch` |
            | Linux — Debian (Bookworm+) | `md2latex-linux-debian` |
            | Linux — Fedora | `md2latex-linux-fedora` |
            | Linux — Ubuntu (20.04+) | `md2latex-linux-ubuntu` |
            | Windows | `md2latex-windows.exe` |
            | macOS | `md2latex-macos` |

            ### Linux — dar permisos de ejecución
            ```bash
            chmod +x md2latex-linux-<distro>
            ./md2latex-linux-<distro>
            ```
          files: |
            dist/md2latex-linux-arch/md2latex-linux-arch
            dist/md2latex-linux-debian/md2latex-linux-debian
            dist/md2latex-linux-fedora/md2latex-linux-fedora
            dist/md2latex-linux-ubuntu/md2latex-linux-ubuntu
            dist/md2latex-windows/md2latex.exe
            dist/md2latex-macos/md2latex-macos
          draft: false
          prerelease: false
