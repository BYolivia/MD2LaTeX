name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux: bundle tar.gz universal (onedir + install.sh) ────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compilar bundle en Docker (ubuntu:20.04)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            ubuntu:20.04 \
            bash scripts/build-linux.sh
          sudo chown -R "$USER:$USER" dist/

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-linux
          path: dist/md2latex.bundle

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller md2latex.spec

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-windows
          path: dist/md2latex.exe

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Compilar con PyInstaller
        run: pyinstaller md2latex.spec

      - name: Renombrar ejecutable
        run: mv dist/md2latex dist/md2latex-macos

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: md2latex-macos
          path: dist/md2latex-macos

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Crear release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "md2LaTeX ${{ github.ref_name }}"
          body: |
            ## md2LaTeX ${{ github.ref_name }}

            Conversor bidireccional Markdown ↔ LaTeX con interfaz gráfica.

            ### Descargas

            | Plataforma | Archivo |
            |---|---|
            | Linux (universal) | `md2latex.bundle` |
            | Windows | `md2latex.exe` |
            | macOS | `md2latex-macos` |

            ### Linux — instalación
            ```bash
            chmod +x md2latex.bundle
            sudo ./md2latex.bundle
            ```
            Después ejecuta `md2latex` desde cualquier terminal.

            ### macOS
            ```bash
            chmod +x md2latex-macos
            ./md2latex-macos
            ```
          files: |
            dist/md2latex-linux/md2latex.bundle
            dist/md2latex-windows/md2latex.exe
            dist/md2latex-macos/md2latex-macos
          draft: false
          prerelease: false
